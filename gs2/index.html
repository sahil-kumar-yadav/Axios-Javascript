<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axios Tutorial - GS2: Fetch JSON Data</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background-color: #f5f5f5;
    }
    #btn {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    #btn:hover {
      background-color: #45a049;
    }
    .data-container {
      margin-top: 20px;
      padding: 15px;
      background-color: white;
      border-radius: 4px;
      display: inline-block;
      margin-right: 10px;
    }
    .label {
      font-weight: bold;
      color: #666;
      font-size: 14px;
    }
    .value {
      font-size: 18px;
      color: #333;
      margin-top: 5px;
    }
    h1 {
      color: #333;
    }
  </style>
</head>

<body>
  <h1>Axios Tutorial - GS2</h1>
  <p>Topic: Fetch Data from JSON File</p>
  
  <input type="submit" value="Fetch JSON Data" id="btn">
  
  <div class="data-container">
    <div class="label">Name:</div>
    <div class="value" id="divdata1"></div>
  </div>
  
  <div class="data-container">
    <div class="label">Roll:</div>
    <div class="value" id="divdata2"></div>
  </div>

  <!-- Using latest Axios CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
  <script src="axiosscript.js"></script>
</body>

</html>
