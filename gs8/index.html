<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axios Tutorial - GS8: Random Image API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background-color: #f5f5f5;
    }
    #btn {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #E91E63;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    #btn:hover {
      background-color: #C2185B;
    }
    #status {
      margin-top: 20px;
      padding: 15px;
      background-color: white;
      border-radius: 4px;
      border-left: 4px solid #E91E63;
    }
    .image-container {
      margin-top: 20px;
      text-align: center;
    }
    #image {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      display: none;
    }
    .label {
      font-weight: bold;
      color: #666;
      font-size: 14px;
      margin-top: 10px;
    }
    .value {
      font-size: 16px;
      color: #333;
    }
    .success {
      color: #4CAF50;
      font-size: 18px;
      font-weight: bold;
    }
    .error {
      color: #f44336;
      font-size: 18px;
      font-weight: bold;
    }
    .loading {
      color: #2196F3;
      font-size: 18px;
      font-weight: bold;
    }
    h1 {
      color: #333;
    }
    .info-box {
      background-color: #e3f2fd;
      border-left: 4px solid #2196F3;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <h1>Axios Tutorial - GS8</h1>
  <p>Topic: Fetch and Display Random Images (Dog API)</p>
  
  <div class="info-box">
    <strong>Demonstrates:</strong>
    <ul>
      <li>Fetching data from an external API</li>
      <li>Handling JSON responses</li>
      <li>Displaying images dynamically</li>
      <li>Loading states and error handling</li>
    </ul>
  </div>
  
  <input type="submit" value="Get Random Dog" id="btn">
  
  <div class="image-container">
    <img src="" alt="Random Dog" id="image">
  </div>
  
  <div id="status"></div>

  <!-- Using latest Axios CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
  <script src="axiosscript.js"></script>
</body>

</html>
